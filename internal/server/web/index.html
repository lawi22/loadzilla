<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loadzilla</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;
  --surface:#0f1724;
  --surface2:#0b1120;
  --border:#1e2d42;
  --border-hi:#2a3d58;
  --accent:#00c853;
  --accent-dim:#00963e;
  --accent-bg:rgba(0,200,83,0.08);
  --text:#c8d8e8;
  --dim:#5a7a99;
  --error:#ff4757;
  --warn:#ffa502;
  --ok:#2ed573;
}
body{background:var(--bg);color:var(--text);font-family:'Fira Code','Cascadia Code',Consolas,'Courier New',monospace;font-size:14px;line-height:1.6;padding:20px 16px;min-height:100vh}
.container{max-width:760px;margin:0 auto}
header{margin-bottom:24px;display:flex;align-items:baseline;gap:14px}
.logo{font-size:20px;font-weight:700;color:var(--accent);letter-spacing:.04em}
.logo span{color:var(--dim);font-size:12px;font-weight:400}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px 20px;margin-bottom:14px}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:14px}

/* Form elements */
input,textarea,select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:13px;padding:7px 10px;border-radius:5px;outline:none;width:100%;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
input[type=checkbox]{width:auto;accent-color:var(--accent);cursor:pointer;margin:0}
textarea{resize:vertical}
select option{background:var(--surface)}
.field{margin-bottom:12px}
.field>label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px}
.url-required{color:var(--error);margin-left:2px}
.input-row{display:flex;align-items:center;gap:8px}
.input-row input{flex:1}
.input-unit{font-size:12px;color:var(--dim);white-space:nowrap}

/* Toggle items */
.toggle-list{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.toggle-item{border:1px solid var(--border);border-radius:6px;overflow:hidden}
.toggle-header{display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer;user-select:none}
.toggle-header:hover{background:rgba(255,255,255,.025)}
.toggle-label{font-size:13px;color:var(--text);flex:1}
.toggle-default{font-size:11px;color:var(--dim);margin-left:4px}
.toggle-body{display:none;padding:10px 12px 12px;border-top:1px solid var(--border)}
.toggle-body.open{display:block}

/* Header rows */
.header-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.header-row input{flex:1}
.btn-rm{background:transparent;border:1px solid var(--border);color:var(--dim);cursor:pointer;padding:4px 8px;border-radius:4px;font-family:inherit;font-size:13px;line-height:1}
.btn-rm:hover{border-color:var(--error);color:var(--error)}
.btn-ghost{background:transparent;border:1px dashed var(--border);color:var(--dim);cursor:pointer;padding:6px 12px;border-radius:5px;width:100%;font-family:inherit;font-size:12px;margin-top:2px;transition:border-color .15s,color .15s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

/* Dropzone */
.dropzone{border:2px dashed var(--border);border-radius:6px;padding:22px 16px;text-align:center;color:var(--dim);font-size:13px;cursor:pointer;transition:border-color .2s,color .2s;position:relative}
.dropzone:hover,.dropzone.drag-over{border-color:var(--accent);color:var(--accent)}
.drop-link{color:var(--accent);text-decoration:underline;cursor:pointer}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{background:var(--accent-bg);border:1px solid var(--accent-dim);color:var(--accent);padding:3px 10px;border-radius:4px;font-size:12px;cursor:pointer;user-select:none;transition:background .15s}
.chip:hover{background:rgba(0,200,83,.18)}
.csv-info{margin-top:6px;font-size:12px;color:var(--dim)}

/* Controls */
.controls{display:flex;gap:10px;margin-bottom:14px}
.btn-primary,.btn-danger{padding:9px 24px;border-radius:6px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border:none;letter-spacing:.04em;transition:background .15s,opacity .15s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover:not(:disabled){background:#00e65b}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-danger{background:transparent;border:1px solid var(--error);color:var(--error)}
.btn-danger:hover:not(:disabled){background:rgba(255,71,87,.1)}
.btn-danger:disabled{opacity:.35;cursor:not-allowed}

/* Progress */
.progress-wrap{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.progress-bar{flex:1;background:var(--border);border-radius:4px;height:7px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#00e65b);border-radius:4px;width:0%;transition:width .9s ease}
.progress-pct{font-size:13px;color:var(--accent);font-weight:700;min-width:38px;text-align:right}
.pstats{display:flex;gap:24px}
.pstat .pval{font-size:18px;font-weight:700;color:var(--text)}
.pstat .pval.ac{color:var(--accent)}
.pstat .pval.er{color:var(--error)}
.pstat .plbl{font-size:11px;color:var(--dim);margin-top:1px}

/* Results */
.results-section{margin-bottom:20px}
.results-section:last-child{margin-bottom:0}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:10px}
.rtable{width:100%;border-collapse:collapse;font-size:13px}
.rtable td{padding:6px 0;border-bottom:1px solid var(--border)}
.rtable td:first-child{color:var(--dim);width:44%}
.rtable td:last-child{text-align:right}
.rtable tr:last-child td{border-bottom:none}
.lat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.lat-cell{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center}
.lat-lbl{font-size:12px;color:var(--dim)}
.lat-val{font-size:13px;color:var(--accent);font-weight:700}
.badge{display:inline-block;padding:1px 7px;border-radius:3px;font-size:12px;font-weight:700}
.b2xx{background:rgba(46,213,115,.12);color:var(--ok)}
.b3xx{background:rgba(255,165,2,.12);color:var(--warn)}
.b4xx,.b5xx,.berr{background:rgba(255,71,87,.12);color:var(--error)}
.txt-ok{color:var(--ok)}
.txt-er{color:var(--error)}
.divider{height:1px;background:var(--border);margin:16px 0}
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">⚡ Loadzilla <span>HTTP load testing</span></div>
  </header>

  <!-- Config card -->
  <div class="card">
    <div class="card-title">Test Configuration</div>

    <div class="field">
      <label for="url">URL<span class="url-required">*</span></label>
      <input type="text" id="url" placeholder="https://example.com/api/endpoint" autocomplete="off" spellcheck="false">
    </div>

    <div class="toggle-list">

      <div class="toggle-item">
        <div class="toggle-header" onclick="toggleSection('method',this)">
          <input type="checkbox" id="toggle-method" class="toggle-cb" data-target="method" tabindex="-1">
          <span class="toggle-label">Method <span class="toggle-default" id="def-method">(GET)</span></span>
        </div>
        <div class="toggle-body" id="body-method">
          <select id="method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="PATCH">PATCH</option>
            <option value="DELETE">DELETE</option>
            <option value="HEAD">HEAD</option>
            <option value="OPTIONS">OPTIONS</option>
          </select>
        </div>
      </div>

      <div class="toggle-item">
        <div class="toggle-header" onclick="toggleSection('headers',this)">
          <input type="checkbox" id="toggle-headers" class="toggle-cb" data-target="headers" tabindex="-1">
          <span class="toggle-label">Headers</span>
        </div>
        <div class="toggle-body" id="body-headers">
          <div id="headers-list"></div>
          <button type="button" class="btn-ghost" id="add-header-btn">+ Add Header</button>
        </div>
      </div>

      <div class="toggle-item">
        <div class="toggle-header" onclick="toggleSection('body',this)">
          <input type="checkbox" id="toggle-body" class="toggle-cb" data-target="body" tabindex="-1">
          <span class="toggle-label">Body</span>
        </div>
        <div class="toggle-body" id="body-body">
          <textarea id="body-input" rows="5" placeholder='{"key": "value"}' spellcheck="false"></textarea>
        </div>
      </div>

      <div class="toggle-item">
        <div class="toggle-header" onclick="toggleSection('connections',this)">
          <input type="checkbox" id="toggle-connections" class="toggle-cb" data-target="connections" tabindex="-1">
          <span class="toggle-label">Connections <span class="toggle-default">(10)</span></span>
        </div>
        <div class="toggle-body" id="body-connections">
          <div class="input-row">
            <input type="number" id="connections" value="10" min="1" max="10000">
            <span class="input-unit">concurrent goroutines</span>
          </div>
        </div>
      </div>

      <div class="toggle-item">
        <div class="toggle-header" onclick="toggleSection('rps',this)">
          <input type="checkbox" id="toggle-rps" class="toggle-cb" data-target="rps" tabindex="-1">
          <span class="toggle-label">RPS Limit <span class="toggle-default">(unlimited)</span></span>
        </div>
        <div class="toggle-body" id="body-rps">
          <div class="input-row">
            <input type="number" id="rps" value="100" min="0">
            <span class="input-unit">req/s — 0 = unlimited</span>
          </div>
        </div>
      </div>

      <div class="toggle-item">
        <div class="toggle-header" onclick="toggleSection('duration',this)">
          <input type="checkbox" id="toggle-duration" class="toggle-cb" data-target="duration" tabindex="-1">
          <span class="toggle-label">Duration <span class="toggle-default">(10s)</span></span>
        </div>
        <div class="toggle-body" id="body-duration">
          <div class="input-row">
            <input type="number" id="duration" value="10" min="1">
            <span class="input-unit">seconds</span>
          </div>
        </div>
      </div>

    </div><!-- toggle-list -->
  </div><!-- config card -->

  <!-- CSV card -->
  <div class="card">
    <div class="card-title">CSV Variables</div>
    <div class="dropzone" id="dropzone">
      <span id="drop-text">Drop a CSV file here, or <span class="drop-link" id="browse-link">browse</span></span>
      <input type="file" id="csv-file" accept=".csv" style="display:none">
    </div>
    <div id="csv-chips" class="chips"></div>
    <div id="csv-info" class="csv-info"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button type="button" class="btn-primary" id="run-btn">▶ Run Test</button>
    <button type="button" class="btn-danger" id="stop-btn" disabled>■ Stop</button>
  </div>

  <!-- Progress card -->
  <div class="card" id="progress-card" style="display:none">
    <div class="card-title">Progress</div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>
    <div class="pstats">
      <div class="pstat">
        <div class="pval" id="pval-total">0</div>
        <div class="plbl">Requests</div>
      </div>
      <div class="pstat">
        <div class="pval ac" id="pval-rps">0</div>
        <div class="plbl">Req/s</div>
      </div>
      <div class="pstat">
        <div class="pval" id="pval-errors">0</div>
        <div class="plbl">Errors</div>
      </div>
    </div>
  </div>

  <!-- Results card -->
  <div class="card" id="results-card" style="display:none">
    <div class="card-title">Results</div>
    <div id="results-body"></div>
  </div>

</div><!-- container -->

<script>
'use strict';

// ─── State ───────────────────────────────────────────────────────────────────
let lastFocused = null;
let csvRows = [];
let abortController = null;

// ─── Focus tracking for chip insertion ───────────────────────────────────────
document.addEventListener('focusin', function(e) {
  if (e.target.matches('input[type=text],input[type=url],input[type=number],textarea') &&
      e.target.id !== 'connections' && e.target.id !== 'rps' && e.target.id !== 'duration') {
    lastFocused = e.target;
  }
});
// Also track text inputs by type
document.addEventListener('focusin', function(e) {
  if (e.target.matches('input[type=text],textarea') ||
      (e.target.tagName === 'INPUT' && (e.target.type === 'text' || e.target.type === 'url' || e.target.type === ''))) {
    if (!['connections','rps','duration'].includes(e.target.id)) {
      lastFocused = e.target;
    }
  }
});

// ─── Toggle sections ─────────────────────────────────────────────────────────
function toggleSection(target, headerEl) {
  const cb = headerEl.querySelector('.toggle-cb');
  const body = document.getElementById('body-' + target);
  cb.checked = !cb.checked;
  body.classList.toggle('open', cb.checked);
}

// Prevent double-toggle when clicking directly on the checkbox
document.querySelectorAll('.toggle-cb').forEach(function(cb) {
  cb.addEventListener('click', function(e) { e.stopPropagation(); });
  cb.addEventListener('change', function() {
    const body = document.getElementById('body-' + this.dataset.target);
    body.classList.toggle('open', this.checked);
  });
});

// ─── Headers ─────────────────────────────────────────────────────────────────
document.getElementById('add-header-btn').addEventListener('click', function() {
  addHeaderRow('', '');
});

function addHeaderRow(key, val) {
  const row = document.createElement('div');
  row.className = 'header-row';
  const ki = document.createElement('input');
  ki.type = 'text'; ki.className = 'hkey'; ki.placeholder = 'Content-Type'; ki.value = key;
  const vi = document.createElement('input');
  vi.type = 'text'; vi.className = 'hval'; vi.placeholder = 'application/json'; vi.value = val;
  const rm = document.createElement('button');
  rm.type = 'button'; rm.className = 'btn-rm'; rm.textContent = '×';
  rm.addEventListener('click', function() { row.remove(); });
  row.appendChild(ki); row.appendChild(vi); row.appendChild(rm);
  document.getElementById('headers-list').appendChild(row);
}

// ─── CSV handling ─────────────────────────────────────────────────────────────
var dropzone = document.getElementById('dropzone');
var csvFile = document.getElementById('csv-file');

document.getElementById('browse-link').addEventListener('click', function(e) {
  e.stopPropagation();
  csvFile.click();
});
dropzone.addEventListener('click', function() { csvFile.click(); });
dropzone.addEventListener('dragover', function(e) {
  e.preventDefault();
  dropzone.classList.add('drag-over');
});
dropzone.addEventListener('dragleave', function() {
  dropzone.classList.remove('drag-over');
});
dropzone.addEventListener('drop', function(e) {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  var f = e.dataTransfer.files[0];
  if (f) handleCSVFile(f);
});
csvFile.addEventListener('change', function() {
  if (this.files[0]) handleCSVFile(this.files[0]);
});

function handleCSVFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var result = parseCSV(e.target.result);
    csvRows = result.rows;
    renderChips(result.headers);
    document.getElementById('csv-info').textContent =
      result.rows.length + ' rows · ' + result.headers.length + ' columns: ' + result.headers.join(', ');
    document.getElementById('drop-text').innerHTML = '✓ <strong>' + escHtml(file.name) + '</strong> loaded — click chips to insert variables';
  };
  reader.readAsText(file);
}

function parseCSV(text) {
  var lines = text.trim().split(/\r?\n/);
  if (lines.length < 1) return { headers: [], rows: [] };
  var headers = splitCSVLine(lines[0]);
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var vals = splitCSVLine(lines[i]);
    var row = {};
    headers.forEach(function(h, idx) { row[h] = vals[idx] !== undefined ? vals[idx] : ''; });
    rows.push(row);
  }
  return { headers: headers, rows: rows };
}

function splitCSVLine(line) {
  var result = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; continue; }
    cur += c;
  }
  result.push(cur.trim());
  return result;
}

function renderChips(headers) {
  var container = document.getElementById('csv-chips');
  container.innerHTML = '';
  headers.forEach(function(h) {
    var chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = '{$' + h + '}';
    chip.addEventListener('mousedown', function(e) {
      e.preventDefault(); // keep focus in lastFocused
      insertAtCursor('{$' + h + '}');
    });
    container.appendChild(chip);
  });
}

function insertAtCursor(text) {
  if (!lastFocused) return;
  var el = lastFocused;
  var start = el.selectionStart != null ? el.selectionStart : el.value.length;
  var end = el.selectionEnd != null ? el.selectionEnd : el.value.length;
  el.value = el.value.slice(0, start) + text + el.value.slice(end);
  el.selectionStart = el.selectionEnd = start + text.length;
  el.focus();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Config collection ───────────────────────────────────────────────────────
function collectConfig() {
  var url = document.getElementById('url').value.trim();
  if (!url) { alert('Please enter a URL.'); return null; }

  var cfg = {
    url: url,
    method: 'GET',
    headers: {},
    body: '',
    connections: 10,
    rps: 0,
    duration: 10
  };

  if (document.getElementById('toggle-method').checked) {
    cfg.method = document.getElementById('method').value;
  }
  if (document.getElementById('toggle-headers').checked) {
    document.querySelectorAll('.header-row').forEach(function(row) {
      var k = row.querySelector('.hkey').value.trim();
      var v = row.querySelector('.hval').value.trim();
      if (k) cfg.headers[k] = v;
    });
  }
  if (document.getElementById('toggle-body').checked) {
    cfg.body = document.getElementById('body-input').value;
  }
  if (document.getElementById('toggle-connections').checked) {
    cfg.connections = parseInt(document.getElementById('connections').value, 10) || 10;
  }
  if (document.getElementById('toggle-rps').checked) {
    cfg.rps = parseInt(document.getElementById('rps').value, 10) || 0;
  }
  if (document.getElementById('toggle-duration').checked) {
    cfg.duration = parseFloat(document.getElementById('duration').value) || 10;
  }
  if (csvRows.length > 0) {
    cfg.csv_rows = csvRows;
  }
  return cfg;
}

// ─── Run / Stop ───────────────────────────────────────────────────────────────
var runBtn = document.getElementById('run-btn');
var stopBtn = document.getElementById('stop-btn');
var progressCard = document.getElementById('progress-card');
var resultsCard = document.getElementById('results-card');

runBtn.addEventListener('click', runTest);
stopBtn.addEventListener('click', function() {
  if (abortController) abortController.abort();
});

function setRunning(on) {
  runBtn.disabled = on;
  stopBtn.disabled = !on;
  if (on) {
    progressCard.style.display = 'block';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('progress-pct').textContent = '0%';
    document.getElementById('pval-total').textContent = '0';
    document.getElementById('pval-rps').textContent = '0';
    setErrorStat(0);
  }
}

function setErrorStat(n) {
  var el = document.getElementById('pval-errors');
  el.textContent = fmtNum(n);
  el.className = 'pval' + (n > 0 ? ' er' : '');
}

async function runTest() {
  var cfg = collectConfig();
  if (!cfg) return;

  abortController = new AbortController();
  setRunning(true);
  resultsCard.style.display = 'none';

  try {
    var response = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(cfg),
      signal: abortController.signal
    });

    if (!response.ok) {
      var text = await response.text();
      if (response.status === 409) {
        alert('A test is already running. Please wait.');
      } else {
        alert('Error starting test: ' + text.trim());
      }
      setRunning(false);
      return;
    }

    var reader = response.body.getReader();
    var decoder = new TextDecoder();
    var buf = '';

    while (true) {
      var chunk = await reader.read();
      if (chunk.done) {
        if (buf.trim()) processSSEPart(buf);
        break;
      }
      buf += decoder.decode(chunk.value, { stream: true });
      var parts = buf.split('\n\n');
      buf = parts.pop();
      parts.forEach(processSSEPart);
    }
  } catch(err) {
    if (err.name !== 'AbortError') console.error('stream error:', err);
  }

  setRunning(false);
}

function processSSEPart(part) {
  var line = part.trim();
  if (!line.startsWith('data: ')) return;
  try {
    var ev = JSON.parse(line.slice(6));
    handleEvent(ev);
  } catch(_) {}
}

function handleEvent(ev) {
  if (ev.type === 'progress') {
    updateProgress(ev.pct, ev.total, ev.rps, ev.errors);
  } else if (ev.type === 'done') {
    var s = ev.summary;
    updateProgress(100, s.total, 0, s.errors);
    renderResults(s);
  }
}

function updateProgress(pct, total, rps, errors) {
  var p = Math.min(pct || 0, 100);
  document.getElementById('progress-fill').style.width = p + '%';
  document.getElementById('progress-pct').textContent = p.toFixed(0) + '%';
  document.getElementById('pval-total').textContent = fmtNum(total || 0);
  document.getElementById('pval-rps').textContent = (rps || 0).toFixed(1);
  setErrorStat(errors || 0);
}

// ─── Results rendering ───────────────────────────────────────────────────────
function renderResults(s) {
  resultsCard.style.display = 'block';

  var total = s.total || 0;
  var success = s.success || 0;
  var errors = s.errors || 0;
  var durS = s.duration_s || 0;
  var throughput = durS > 0 ? (total / durS).toFixed(1) : '—';
  var successPct = total > 0 ? (success / total * 100).toFixed(1) : '0.0';
  var errPct = total > 0 ? (errors / total * 100).toFixed(1) : '0.0';

  var html = '';

  // Requests section
  html += '<div class="results-section">';
  html += '<div class="section-title">Requests</div>';
  html += '<table class="rtable">';
  html += '<tr><td>Total</td><td>' + fmtNum(total) + '</td></tr>';
  html += '<tr><td>Success</td><td class="txt-ok">' + fmtNum(success) + ' (' + successPct + '%)</td></tr>';
  html += '<tr><td>Errors</td><td class="' + (errors > 0 ? 'txt-er' : '') + '">' + fmtNum(errors) + ' (' + errPct + '%)</td></tr>';
  html += '<tr><td>Throughput</td><td>' + throughput + ' req/s</td></tr>';
  html += '</table></div>';

  // Latency section
  html += '<div class="divider"></div>';
  html += '<div class="results-section">';
  html += '<div class="section-title">Latency</div>';
  html += '<div class="lat-grid">';
  html += latCell('Min', s.min_ms);
  html += latCell('P50', s.p50_ms);
  html += latCell('Avg', s.avg_ms);
  html += latCell('P95', s.p95_ms);
  html += latCell('Max', s.max_ms);
  html += latCell('P99', s.p99_ms);
  html += latCell('P75', s.p75_ms);
  html += latCell('P999', s.p999_ms);
  html += '</div></div>';

  // Status codes section
  if (s.status_map && Object.keys(s.status_map).length > 0) {
    html += '<div class="divider"></div>';
    html += '<div class="results-section">';
    html += '<div class="section-title">Status Codes</div>';
    html += '<table class="rtable">';
    var codes = Object.entries(s.status_map).sort(function(a, b) {
      return String(a[0]).localeCompare(String(b[0]));
    });
    codes.forEach(function(pair) {
      var code = pair[0], count = pair[1];
      var cls = code === 'err' ? 'berr'
              : code.startsWith('2') ? 'b2xx'
              : code.startsWith('3') ? 'b3xx'
              : 'b4xx';
      html += '<tr><td><span class="badge ' + cls + '">' + escHtml(code) + '</span></td><td>' + fmtNum(count) + '</td></tr>';
    });
    html += '</table></div>';
  }

  document.getElementById('results-body').innerHTML = html;
  resultsCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function latCell(label, ms) {
  return '<div class="lat-cell"><span class="lat-lbl">' + label + '</span><span class="lat-val">' + fmtMs(ms) + '</span></div>';
}

function fmtMs(ms) {
  if (ms == null || ms === undefined) return '—';
  if (ms < 1) return ms.toFixed(2) + 'ms';
  if (ms >= 1000) return (ms / 1000).toFixed(2) + 's';
  return ms.toFixed(1) + 'ms';
}

function fmtNum(n) {
  return Number(n).toLocaleString();
}
</script>
</body>
</html>
